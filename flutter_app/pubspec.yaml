name: smarterlife
description: Dynamic diet and fitness calorie manager.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  firebase_auth: ^5.1.2
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1
  flutter:
    sdk: flutter
  google_sign_in: ^6.2.1
  http: ^1.2.2
  intl: 0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  sign_in_with_apple: ^6.1.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
